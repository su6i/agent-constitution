<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>راهنمای کامل .cursor + پاسخ سوالات + محتوای آموزشی</title>
<link href="https://fonts.googleapis.com/css2?family=Vazirmatn:wght@300;400;500;600;700;900&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#060810;--s1:#0d0e1d;--s2:#131428;--border:rgba(255,255,255,.07);
  --text:#dde0f2;--muted:#585c8a;--acc:#7c6aff;
  --green:#10b981;--red:#ef4444;--yellow:#f59e0b;--blue:#3b82f6;--purple:#a855f7;
  --orange:#f97316;--pink:#ec4899;
}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Vazirmatn',sans-serif;background:var(--bg);color:var(--text);line-height:1.75;font-size:14px}
.w{max-width:1100px;margin:0 auto;padding:0 18px}

/* NAV */
.nav{position:sticky;top:0;z-index:100;background:rgba(6,8,16,.92);backdrop-filter:blur(12px);
  border-bottom:1px solid var(--border);padding:10px 18px;display:flex;gap:6px;flex-wrap:wrap}
.nav a{color:#8888b8;font-size:11px;text-decoration:none;padding:4px 10px;border-radius:6px;
  border:1px solid transparent;transition:.15s}
.nav a:hover{color:#c0b8ff;border-color:rgba(124,106,255,.3)}

header{padding:44px 0 22px;text-align:center}
.chip{display:inline-block;border:1px solid rgba(124,106,255,.35);background:rgba(124,106,255,.1);
  color:#b0a3ff;font-size:10px;letter-spacing:2px;text-transform:uppercase;padding:4px 16px;
  border-radius:20px;margin-bottom:12px}
h1{font-size:clamp(20px,3.5vw,38px);font-weight:900;
  background:linear-gradient(130deg,#fff 0%,#b0a3ff 55%,#7c6aff 100%);
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;margin-bottom:6px;line-height:1.2}

section{margin-bottom:48px;scroll-margin-top:60px}
.sh{font-size:16px;font-weight:700;padding-bottom:9px;margin-bottom:16px;
  border-bottom:1px solid var(--border);display:flex;align-items:center;gap:9px}

/* BOXES */
.box{border-radius:11px;padding:14px 18px;margin-bottom:12px;font-size:13px;line-height:1.75}
.box-g{background:rgba(16,185,129,.05);border:1px solid rgba(16,185,129,.2);color:#6ee7b7}
.box-g strong{color:#34d399}
.box-r{background:rgba(239,68,68,.05);border:1px solid rgba(239,68,68,.2);color:#fca5a5}
.box-r strong{color:#f87171}
.box-y{background:rgba(245,158,11,.05);border:1px solid rgba(245,158,11,.2);color:#fde68a}
.box-y strong{color:#fbbf24}
.box-b{background:rgba(59,130,246,.05);border:1px solid rgba(59,130,246,.2);color:#bfdbfe}
.box-b strong{color:#93c5fd}
.box-p{background:rgba(168,85,247,.05);border:1px solid rgba(168,85,247,.2);color:#e9d5ff}
.box-p strong{color:#c084fc}

/* FILE TREE */
.tree{background:#0a0b16;border:1px solid var(--border);border-radius:12px;padding:18px 22px;font-family:monospace;font-size:12px;line-height:1.9}
.t-dir{color:#7c6aff;font-weight:700}
.t-file{color:#c0c0e0}
.t-comment{color:#3d4060;font-style:italic}
.t-new{color:#10b981;font-weight:700}
.t-warn{color:#f59e0b}

/* FILE CARDS */
.fc{background:var(--s1);border:1px solid var(--border);border-radius:12px;margin-bottom:12px;overflow:hidden}
.fc-head{padding:13px 18px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:10px}
.fc-icon{font-size:18px}
.fc-title{font-size:13px;font-weight:700;color:#d0d0f0}
.fc-path{font-size:10px;color:var(--muted);margin-top:2px;font-family:monospace}
.fc-badge{font-size:9px;padding:2px 8px;border-radius:5px;margin-left:auto;font-weight:700}
.fb-r{background:rgba(124,106,255,.12);color:#b0a3ff;border:1px solid rgba(124,106,255,.25)}
.fb-w{background:rgba(245,158,11,.1);color:#fbbf24;border:1px solid rgba(245,158,11,.22)}
.fb-g{background:rgba(16,185,129,.1);color:#4ade80;border:1px solid rgba(16,185,129,.22)}
.fc-body{padding:0}
.code{background:#08090f;border-top:1px solid var(--border);padding:14px 18px;font-family:monospace;
  font-size:11px;line-height:1.8;color:#c8cce8;overflow-x:auto;white-space:pre}
/* ... remaining styles OMITTED for conciseness in mock but included in real write ... */
</style>
</head>
<body>
<!-- ... content ... -->
</body>
</html>
