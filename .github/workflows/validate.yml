name: Validate Repository

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  digest-freshness:
    name: Check Rules Digest Freshness
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
      - name: Run bin/generate-digest.sh --check
        run: bash bin/generate-digest.sh --check

  validate-links:
    name: Check Internal Links
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Check Markdown Links
        uses: gaurav-nelson/github-action-markdown-link-check@v1
        with:
          use-quiet-mode: 'yes'
          use-verbose-mode: 'yes'
          config-file: '.github/mlc_config.json'

  lint-markdown:
    name: Lint Markdown Files
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install markdownlint
        run: npm install -g markdownlint-cli

      - name: Lint Markdown
        # rules/DIGEST.md is excluded on purpose: it is an auto-generated
        # artifact whose source blocks already passed lint inside their
        # own rule files. Re-linting it is redundant, and MD029 (ordered
        # list renumbering) is unfixable without rewriting the source
        # rules. Regenerate, don't hand-edit, the digest.
        run: markdownlint '**/*.md' --ignore node_modules --ignore .storage --ignore rules/DIGEST.md

  validate-structure:
    name: Verify File Structure
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Check Required Files
        run: |
          echo "Checking required files..."
          test -f README.md && echo "✅ README.md exists"
          test -f CONTRIBUTING.md && echo "✅ CONTRIBUTING.md exists"
          test -f CHANGELOG.md && echo "✅ CHANGELOG.md exists"
          test -d rules && echo "✅ rules/ exists"
          test -d skills && echo "✅ skills/ exists"
          test -d workflows && echo "✅ workflows/ exists"
          test -d templates && echo "✅ templates/ exists"
          echo "All checks passed!"
